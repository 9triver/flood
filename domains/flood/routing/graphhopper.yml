graphhopper:
  datareader.file: local/routing/shanhu-roads.osm.xml
  graph.location: local/routing/graph-cache

  profiles:
    - name: car
      custom_model_files: [car.json]
    - name: foot
      custom_model_files: [foot.json]

  profiles_ch:
    - profile: car
    - profile: foot
  profiles_lm: []

  graph.encoded_values: car_access, car_average_speed, road_access, foot_access, foot_average_speed, foot_priority, foot_road_access, hike_rating, mtb_rating, country, road_class
  import.osm.ignored_highways: construction
  prepare.min_network_size: 10
  routing.max_visited_nodes: 1000000
  routing.timeout_ms: 20000

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 127.0.0.1
  request_log:
    appenders: []
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 127.0.0.1

logging:
  level: INFO
  appenders:
    - type: console
      time_zone: Asia/Shanghai
