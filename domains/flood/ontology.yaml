  Cell:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: cell_id
    summary: "洪水计算单元"
    description: "Cell 是方案下的淹没空间计算单元，承载水深、流速、到达时间、退水时间等物理量。"
    properties:
      cell_id: {type: str, required: true, description: "计算单元ID"}
      scenario_id: {type: str, description: "所属洪水情景ID"}
      x: {type: float, description: "计算单元代表点 X 坐标"}
      y: {type: float, description: "计算单元代表点 Y 坐标"}
      ground_elevation_m: {type: float, description: "地面高程，对应 Z"}
      water_level_m: {type: float, description: "洪水水位，对应 Eta"}
      depth_m: {type: float, description: "淹没水深，对应 YMSS"}
      velocity_mps: {type: float, description: "流速，对应 HSLS"}
      arrival_time_h: {type: float, description: "洪水到达时间，对应 DDSJ"}
      recession_time_h: {type: float, description: "退水或消退时间，对应 XTSJ"}
      area_m2: {type: float, description: "单元面积，对应 WGMJ 或几何面积"}
      crs: {type: str, description: "原始坐标系"}
      geometry_type: {type: str, description: "GeoJSON 几何类型"}
      geometry: {type: str, description: "GeoJSON geometry JSON 字符串，用于前端绘制"}
      data_path: {type: str, description: "空间数据路径"}

  ForecastRun:
    kind: entity
    data_source: external_api
