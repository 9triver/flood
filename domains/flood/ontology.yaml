    source:
      type: resolver
      resolver: flood_repository
      id_field: forecast_id
    summary: "洪水预测运行"
    description: "ForecastRun 表示一次水文-水动力联动预测运行，记录水文边界、模型名称、生成时间和预测淹没统计。"
    properties:
      forecast_id: {type: str, required: true, description: "预测运行ID，latest 表示当前最新预测"}
      name: {type: str, description: "预测运行名称"}
      status: {type: str, description: "运行状态"}
      model_name: {type: str, description: "模型名称"}
      model_description: {type: str, description: "模型说明"}
      generated_at: {type: str, description: "生成时间"}
      lead_time_h: {type: float, description: "预见期，小时"}
      mesh_source_scenario_id: {type: str, description: "作为计算网格来源的空间单元集合"}
      hydrology_inputs: {type: str, description: "水文边界条件 JSON"}
      forcing_index: {type: float, description: "综合水文边界强度，仅作为模型内部无量纲输入"}
      forecast_cell_count: {type: int, description: "预测有水深的单元数量"}
      inundated_area_km2: {type: float, description: "预测淹没面积，平方千米"}
      max_depth_m: {type: float, description: "最大预测水深，米"}
      mean_depth_m: {type: float, description: "平均预测水深，米"}
      data_path: {type: str, description: "预测 cell 对象路径"}

  ForecastCell:
