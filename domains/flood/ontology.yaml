      scenario_id: {type: str, description: "洪水情景ID"}
      title: {type: str, description: "简报标题"}
      audience: {type: str, description: "受众: command_center/public/traffic/rescue"}
      content: {type: str, description: "简报正文"}
      key_risks: {type: str, description: "关键风险摘要"}
      key_actions: {type: str, description: "关键动作摘要"}
      created_at: {type: str, description: "生成时间"}

