name: flood
description: "水库下游洪水、道路桥梁、重要设施与避洪转移联动分析领域。面向珊瑚河数据，回答洪水事件中哪些道路、桥梁、设施、转移路线和安置对象受影响，以及应采取哪些封控、撤离、绕行和简报建议。"
tool_preferences:
  generic_search: fallback_only

objects:
  River:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: river_id
    summary: "河流主体"
    description: "River 表达珊瑚河这个河流主体，是水文、洪水过程、水利工程和流域对象的关联中心。流域范围由 Watershed 表达，水系线段由 Waterway 表达。"
    properties:
      river_id: {type: str, required: true, description: "河流编号，如 shanhu"}
      name: {type: str, description: "河流名称"}
      water_system: {type: str, description: "所属水系"}
      watershed_id: {type: str, description: "默认关联的流域编号"}
      watershed_name: {type: str, description: "默认关联的流域名称"}

  Watershed:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: watershed_id
    summary: "河流流域范围"
    description: "Watershed 表达珊瑚河流域范围及相关小流域，是河流、行政区、水系和风险对象的空间语义范围。"
    properties:
      watershed_id: {type: str, required: true, description: "流域编号，如 shanhu_watershed"}
      river_id: {type: str, description: "所属河流编号"}
      name: {type: str, description: "流域名称"}
      watershed_type: {type: str, description: "流域类型，如 flood_risk_basin/small_watershed"}
      area_km2: {type: float, description: "流域面积，若数据可得"}

  Waterway:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: waterway_id
    summary: "河道或水系线"
    description: "Waterway 表达流域内河道、水系线段，用于说明河流网络、支流和边界入流关系。"
    properties:
      waterway_id: {type: str, required: true, description: "水系线对象ID，如 waterway_001"}
      river_id: {type: str, description: "所属河流编号"}
      watershed_id: {type: str, description: "所属流域编号"}
      name: {type: str, description: "水系名称，未命名则为空"}
      waterway_type: {type: str, description: "水系类型，如 river/stream"}
      length_m: {type: float, description: "线对象长度，米"}
      inside_basin_length_m: {type: float, description: "估算位于流域内的线段长度，米"}
      inside_basin_ratio: {type: float, description: "估算位于流域内的长度占比"}

  HydrodynamicBoundary:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: boundary_id
    summary: "水动力模型边界和断面位置"
    description: "表达水动力模型中上游入流、沿程入流、支流入流、下游水位边界以及断面位置，用于解释模型输入边界与计算断面的业务角色。"
    properties:
      boundary_id: {type: str, required: true, description: "水动力边界对象编号"}
      river_id: {type: str, description: "所属河流编号"}
      name: {type: str, description: "边界或断面名称"}
      boundary_group: {type: str, description: "边界分组: upstream/interval1/interval2/tonggu/waterlevel"}
      boundary_type: {type: str, description: "原始边界类型或水动力输入类型"}
      boundary_role: {type: str, description: "业务角色: upstream_inflow/lateral_inflow/tributary_inflow/downstream_water_level"}
      is_model_input_boundary: {type: bool, description: "是否为 CNN 水动力模型的 4 个流量输入边界之一"}
      section_code: {type: str, description: "断面编号，若来源为断面位置"}
      flow_node: {type: str, description: "水动力模型 FlowNode 编号，若源数据提供"}

  County:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: county_id
    summary: "县级行政区"
    description: "County 表达县级行政区，领域分析时以县为行政责任和统计单元。"
    properties:
      county_id: {type: str, required: true, description: "县级行政区编码"}
      river_id: {type: str, description: "关联河流编号，当前用于表达珊瑚河流域涉及的县"}
      name: {type: str, description: "县名"}
      adcode: {type: str, description: "行政区划代码"}

  Town:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: town_id
    summary: "乡镇及灾前暴露信息"
    description: "由灾前信息表、转移单元和安置点中的 OwnerTown 字段共同支撑。人口、GDP、产业和房屋财产暴露信息作为 Town 属性。"
    properties:
      town_id: {type: str, required: true, description: "乡镇编码或稳定ID"}
      name: {type: str, description: "乡镇名称"}
      county_id: {type: str, description: "所属县编码"}
      adcode: {type: str, description: "乡镇行政区划代码"}
      population: {type: int, description: "常住人口"}
      gdp_10k_cny: {type: float, description: "GDP，万元"}
      agriculture_10k_cny: {type: float, description: "农林牧渔业产值，万元"}
      housing_property_10k_cny: {type: float, description: "居民房屋及室内财产，万元"}
      transport_industry_10k_cny: {type: float, description: "交通运输业产值，万元"}
      commerce_10k_cny: {type: float, description: "商贸服务业产值，万元"}

  Reservoir:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: reservoir_id
    summary: "水库工程"
    description: "水库对象承接下游洪水来源、调度过程和工程台账信息。"
    properties:
      reservoir_id: {type: str, required: true, description: "水库编号"}
      name: {type: str, description: "水库名称"}
      river_id: {type: str, description: "所在河流编号"}
      county_id: {type: str, description: "所在县编码"}
      town_name: {type: str, description: "所在乡镇"}
      capacity_10k_m3: {type: float, description: "总库容，万立方米"}
      dam_top_elevation_m: {type: float, description: "坝顶高程"}
      design_flood_standard_year: {type: float, description: "设计洪水标准，年一遇"}
      check_flood_standard_year: {type: float, description: "校核洪水标准，年一遇"}
      max_discharge_m3s: {type: float, description: "最大泄量"}
      safety_status: {type: str, description: "安全状态或安全类别"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}

  Sluice:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: sluice_id
    summary: "水闸或分洪闸"
    description: "水闸对象用于表达分洪、泄洪、灌区闸门等工程及后续调度运行状态。"
    properties:
      sluice_id: {type: str, required: true, description: "水闸编号"}
      name: {type: str, description: "水闸名称"}
      river_id: {type: str, description: "所在河流编号"}
      county_id: {type: str, description: "所在县编码"}
      town_name: {type: str, description: "所在乡镇"}
      sluice_type: {type: str, description: "水闸类型，如分洪闸、节制闸"}
      gate_count: {type: int, description: "闸孔数"}
      design_discharge_m3s: {type: float, description: "设计过闸流量或分泄流量"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}

  HydraulicStructure:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: structure_id
    summary: "其他水利工程设施"
    description: "堤防、泵站、溢流建筑物等暂统一为 HydraulicStructure，后续若业务需要再拆成更细对象。"
    properties:
      structure_id: {type: str, required: true, description: "水利工程设施ID"}
      name: {type: str, description: "设施名称"}
      structure_type: {type: str, description: "设施类型: levee/pump_station/spillway/other"}
      river_id: {type: str, description: "所在河流编号，若可识别"}
      river_name: {type: str, description: "所在河流名称，若可识别"}
      county_id: {type: str, description: "所属县编码，若可识别"}
      location: {type: str, description: "位置描述"}
      length_m: {type: float, description: "长度，适用于堤防等线状工程"}
      elevation_m: {type: float, description: "高程，若可得"}
      flow_m3s: {type: float, description: "流量，适用于泵站/泄洪设施"}
      longitude: {type: float, description: "经度，点状设施或代表点"}
      latitude: {type: float, description: "纬度，点状设施或代表点"}


  Road:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: road_id
    summary: "道路"
    description: "Road 表达道路或路段，是交通中断、绕行和转移路线可达性分析的基础对象。"
    properties:
      road_id: {type: str, required: true, description: "道路或路段稳定ID"}
      name: {type: str, description: "道路名称"}
      ref: {type: str, description: "道路编号，如 G65、G78、G241"}
      road_class: {type: str, description: "道路等级或 fclass"}
      one_way: {type: str, description: "单向/双向标记"}
      bridge_flag: {type: bool, description: "该路段是否标记为桥上路段"}
      tunnel_flag: {type: bool, description: "该路段是否标记为隧道路段"}
      length_m: {type: float, description: "道路长度，米"}

  Bridge:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: bridge_id
    summary: "桥梁"
    description: "Bridge 表达桥梁及其通行风险相关属性。现有台账字段可能缺失，因此风险评估需要标注资料质量。"
    properties:
      bridge_id: {type: str, required: true, description: "桥梁稳定ID"}
      name: {type: str, description: "桥梁名称"}
      river_id: {type: str, description: "所在河流编号"}
      road_id: {type: str, description: "关联道路ID，若可识别"}
      length_m: {type: float, description: "桥长"}
      width_m: {type: float, description: "桥宽"}
      deck_elevation_m: {type: float, description: "桥面或梁底高程，若可得"}
      data_quality: {type: str, description: "台账完整性: complete/partial/missing"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}

  Facility:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: facility_id
    summary: "重要设施"
    description: "医院、学校、政府等重要设施统一建模为 Facility，通过 facility_type 区分。"
    properties:
      facility_id: {type: str, required: true, description: "设施ID"}
      name: {type: str, description: "设施名称"}
      facility_type: {type: str, description: "设施类型: hospital/school/government/other"}
      subtype: {type: str, description: "细分类型，如卫生院、小学、政府机构"}
      address: {type: str, description: "地址"}
      town_name: {type: str, description: "所在乡镇，若可推断"}
      county_id: {type: str, description: "所属县编码"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}

  Place:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: place_id
    summary: "安置或应急地点"
    description: "安置点、就地安置点、集合点、物资点等统一为 Place，通过 place_type 区分。"
    properties:
      place_id: {type: str, required: true, description: "地点ID"}
      name: {type: str, description: "地点名称"}
      place_type: {type: str, description: "地点类型: shelter/in_place/assembly/warehouse/medical"}
      town_id: {type: str, description: "所属乡镇编码"}
      town_name: {type: str, description: "所属乡镇名称"}
      county_id: {type: str, description: "所属县编码"}
      area_m2: {type: float, description: "面积，平方米"}
      capacity_person: {type: int, description: "可容纳人数"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}

  Transfer:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: transfer_id
    summary: "避洪转移安排"
    description: "转移对象、转移人口、所属乡镇和预估受影响/到达时间的业务表达。"
    properties:
      transfer_id: {type: str, required: true, description: "转移安排ID"}
      name: {type: str, description: "转移对象名称，如村名"}
      population: {type: int, description: "转移人口数"}
      town_id: {type: str, description: "所属乡镇编码"}
      town_name: {type: str, description: "所属乡镇名称"}
      county_id: {type: str, description: "所属县编码"}
      arrive_time_window: {type: str, description: "洪水到达或转移窗口，如 0-12、12-24"}
      route_id: {type: str, description: "推荐转移路线ID"}
      place_id: {type: str, description: "目标安置地点ID"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}

  Route:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: route_id
    summary: "路线"
    description: "转移路线、救援路线、绕行路线统一为 Route，通过 route_type 区分。"
    properties:
      route_id: {type: str, required: true, description: "路线ID"}
      name: {type: str, description: "路线名称"}
      route_type: {type: str, description: "路线类型: transfer/rescue/detour/supply"}
      road_detail: {type: str, description: "路线道路描述"}
      transfer_id: {type: str, description: "关联转移安排ID，若为转移路线"}
      place_id: {type: str, description: "目标地点ID"}
      population: {type: int, description: "服务或转移人口"}
      length_m: {type: float, description: "路线长度，米"}

  ForecastRun:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: forecast_id
    summary: "洪水预测运行"
    description: "ForecastRun 表示一次水文-水动力联动预测运行，记录水文边界、模型名称、生成时间和预测淹没统计。"
    properties:
      forecast_id: {type: str, required: true, description: "预测运行ID，latest 表示当前最新预测"}
      name: {type: str, description: "预测运行名称"}
      status: {type: str, description: "运行状态"}
      model_name: {type: str, description: "模型名称"}
      model_description: {type: str, description: "模型说明"}
      generated_at: {type: str, description: "生成时间"}
      lead_time_h: {type: float, description: "预见期，小时"}
      mesh_source_id: {type: str, description: "作为计算网格来源的水动力网格集合"}
      hydrology_inputs: {type: str, description: "水文边界条件 JSON"}
      forcing_index: {type: float, description: "综合水文边界强度，仅作为模型内部无量纲输入"}
      forecast_cell_count: {type: int, description: "预测有水深的单元数量"}
      inundated_area_km2: {type: float, description: "预测淹没面积，平方千米"}
      max_depth_m: {type: float, description: "最大预测水深，米"}
      mean_depth_m: {type: float, description: "平均预测水深，米"}

  ForecastCell:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: forecast_cell_id
    summary: "预测淹没单元"
    description: "ForecastCell 是水动力预测直接输出的淹没单元，承载预测水深、流速、到达时间和退水时间。"
    properties:
      forecast_cell_id: {type: str, required: true, description: "预测计算单元ID"}
      forecast_id: {type: str, description: "所属预测运行ID"}
      model_name: {type: str, description: "输出该单元的模型名称"}
      mesh_cell_id: {type: str, description: "基础计算网格单元ID"}
      mesh_source_id: {type: str, description: "基础网格来源"}
      lead_time_h: {type: float, description: "预见期，小时"}
      centroid_lon: {type: float, description: "单元中心经度"}
      centroid_lat: {type: float, description: "单元中心纬度"}
      distance_to_river_m: {type: float, description: "到河道中心线距离，米"}
      ground_elevation_m: {type: float, description: "地面高程，米"}
      water_level_m: {type: float, description: "预测水位，米"}
      depth_m: {type: float, description: "预测水深，米"}
      velocity_mps: {type: float, description: "预测流速，米每秒"}
      arrival_time_h: {type: float, description: "洪水到达时间，小时"}
      recession_time_h: {type: float, description: "退水时间，小时"}
      risk_level: {type: str, description: "由水深和流速派生的风险等级"}
      area_m2: {type: float, description: "单元面积，平方米"}

  HydrodynamicCell:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: hydrodynamic_cell_id
    summary: "水动力模型网格单元"
    description: "HydrodynamicCell 是水动力模型的静态三角网格计算单元，可承载某次预测对应的最大水深结果。"
    properties:
      hydrodynamic_cell_id: {type: str, required: true, description: "水动力网格单元ID"}
      cell_id: {type: int, description: "模型原始 cell 编号"}
      depth_m: {type: float, description: "模型输出最大水深，米；0 表示无水"}
      is_flooded: {type: bool, description: "是否有水深"}

  Hydrology:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: hydrology_id
    summary: "水文成果"
    description: "设计暴雨、设计洪水、洪峰流量和泄量等成果。"
    properties:
      hydrology_id: {type: str, required: true, description: "水文成果ID"}
      river_id: {type: str, description: "对应河流编号"}
      design_frequency_year: {type: int, description: "设计频率，年"}
      duration_h: {type: float, description: "设计暴雨历时，小时"}
      design_rainfall_mm: {type: float, description: "设计暴雨，毫米"}
      peak_inflow_m3s: {type: float, description: "入库洪峰流量"}
      max_discharge_m3s: {type: float, description: "最大泄量"}

  HydroStation:
    kind: entity
    data_source: mixed
    mutability: read_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: station_id
    summary: "水文、雨量或气象测站"
    description: "表达珊瑚河流域及附近可作为自动感知来源的测站，包括龙潭水库站、雨量站和气象站。"
    properties:
      station_id: {type: str, required: true, description: "测站ID"}
      river_id: {type: str, description: "关联河流编号"}
      name: {type: str, description: "测站名称"}
      alias: {type: str, description: "别名或表格站名"}
      station_type: {type: str, description: "测站类型: reservoir_hydro_rainfall/rainfall/weather"}
      location: {type: str, description: "测站位置描述"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}
      elevation_m: {type: float, description: "站点高程，若资料给出"}
      established_year: {type: int, description: "设站年份"}
      observation_items: {type: str, description: "观测项目，如 rainfall,water_level,outflow"}
      record_period: {type: str, description: "资料系列或可用时段说明"}

  Risk:
    kind: entity
    data_source: mixed
    mutability: append_only
    source:
      type: resolver
      resolver: flood_repository
      id_field: risk_id
    summary: "风险或危险区对象"
    description: "统一表达道路、桥梁、设施、路线、乡镇、安置地点等目标对象的风险，也可承接本地危险区台账中的空间点对象。"
    properties:
      risk_id: {type: str, required: true, description: "风险评估ID"}
      target_type: {type: str, description: "目标对象类型: Road/Bridge/Facility/Route/Town/Place/Transfer"}
      target_id: {type: str, description: "目标对象ID"}
      name: {type: str, description: "风险点或危险区名称"}
      risk_type: {type: str, description: "风险类型: danger_area/inundation/interruption/overtopping/scour/isolation/evacuation_blocked/capacity_shortage"}
      risk_level: {type: str, description: "风险等级: low/medium/high/critical/unknown"}
      city: {type: str, description: "所在市"}
      county_name: {type: str, description: "所在县区"}
      town_name: {type: str, description: "所在乡镇"}
      village_committee: {type: str, description: "行政村"}
      natural_village: {type: str, description: "自然村或自然屯"}
      longitude: {type: float, description: "经度"}
      latitude: {type: float, description: "纬度"}
      max_depth_m: {type: float, description: "最大淹没水深"}
      max_velocity_mps: {type: float, description: "最大流速"}
      first_arrival_time_h: {type: float, description: "最早受影响时间"}
      affected_length_m: {type: float, description: "受影响长度，适用于道路或路线"}
      affected_population: {type: int, description: "受影响人口"}
      evidence: {type: str, description: "风险判断依据"}
      data_quality: {type: str, description: "证据质量: model_overlay/table_record/manual/insufficient"}
      recommended_action: {type: str, description: "建议动作摘要"}

links:
  river_watersheds:
    source: River
    target: Watershed
    join: {source_key: river_id, target_key: river_id}
    description: "河流关联的流域范围"
    link_type: contains
    cardinality: 1..n

  river_counties:
    source: Watershed
    target: County
    join: {source_key: river_id, target_key: river_id}
    description: "流域涉及的县级行政区，当前可由空间叠加或配置生成"
    link_type: contains
    cardinality: 1..n

  watershed_waterways:
    source: Watershed
    target: Waterway
    join: {source_key: watershed_id, target_key: watershed_id}
    description: "流域内的河道或水系线"
    link_type: contains
    cardinality: 1..n

  county_towns:
    source: County
    target: Town
    join: {source_key: county_id, target_key: county_id}
    description: "县包含乡镇"
    link_type: contains
    cardinality: 1..n

  river_reservoirs:
    source: River
    target: Reservoir
    join: {source_key: river_id, target_key: river_id}
    description: "河流关联水库"
    link_type: relates
    cardinality: 1..n

  river_sluices:
    source: River
    target: Sluice
    join: {source_key: river_id, target_key: river_id}
    description: "河流关联水闸"
    link_type: relates
    cardinality: 1..n

  river_hydraulic_structures:
    source: River
    target: HydraulicStructure
    join: {source_key: river_id, target_key: river_id}
    description: "河流关联的堤防、泵站、溢流建筑物等水利工程设施"
    link_type: relates
    cardinality: 1..n

  river_hydro_stations:
    source: River
    target: HydroStation
    join: {source_key: river_id, target_key: river_id}
