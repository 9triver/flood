      type: resolver
      resolver: flood_repository
      id_field: scenario_id
    summary: "洪水情景"
    description: "5年、10年、20年、50年、100年一遇等洪水方案。"
    properties:
      scenario_id: {type: str, required: true, description: "方案编码，如 45050092hsfx0001"}
      river_id: {type: str, description: "对应河流编号"}
