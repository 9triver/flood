rules:
  road_passability_by_depth:
    description: "按水深判断道路通行风险的基础阈值。阈值应结合本地标准和车辆类型校核。"
    rule_type: threshold
    applies_to: [Risk]
    result_field: risk_level
    source: "原型规则: depth>=0.5m critical, depth>=0.3m high, depth>=0.15m medium"
    conditions:
      - {field: max_depth_m, operator: gte, value: 0.5, result: critical}
      - {field: max_depth_m, operator: gte, value: 0.3, result: high}
      - {field: max_depth_m, operator: gte, value: 0.15, result: medium}

  evacuation_route_blocked:
    description: "转移路线存在较深积水或高流速时判为转移受阻。"
    rule_type: threshold
    applies_to: [Risk]
    result_field: risk_level
    source: "原型规则: transfer route depth>=0.3m 或 velocity>=1.0m/s 为 high/critical"
    conditions:
      - {field: max_depth_m, operator: gte, value: 0.5, result: critical}
      - {field: max_velocity_mps, operator: gte, value: 1.0, result: high}
      - {field: max_depth_m, operator: gte, value: 0.3, result: high}

functions:
  run_flood_forecast:
    summary: "运行或读取最新洪水预测"
    description: "读取最新四边界流量过程线，先执行干态门控规则；达到触发条件时调用 CNN_V2 水动力模型生成水动力网格 max_depth 预测结果和 ForecastRun 汇总。该函数不把 severity 或综合指标映射为 5/10/20/50/100 年一遇设计方案。"
    usage_prompt: "当用户要求运行预测、查看实时预测、显示未来淹没，或水文异常事件中的 forecast_trigger.should_run_forecast 为 true 且需要推演时调用。该函数只返回 ForecastRun 汇总；如需在 GIS 展示预测淹没范围，LLM 应在本函数返回后调用 ui_show_objects，object_type=HydrodynamicCell，filters={\"forecast_id\":\"latest\"}，label=预测淹没结果，fit=false，refresh=true。"
    function_type: lookup
    involves_objects: [ForecastRun, ForecastCell, HydrodynamicCell, River, Reservoir]
    params:
      forecast_id: {type: str, description: "预测运行ID；latest 表示最新预测", default: "latest"}
      force: {type: bool, description: "是否强制重新运行简化模型", default: false}

  run_emergency_cycle:
    summary: "运行水文观测-预测-告警-调度闭环原型"
    description: "使用 mock 水文观测与规则，运行简化水动力预测，生成预警级别、受影响转移对象、道路/路线关注对象和调度建议。预测结果直接来自 ForecastCell，不通过设计频率映射。"
    usage_prompt: "当用户要求自主观测、持续预测、自动告警、闭环调度、避洪转移调度或应急循环时调用。该函数只返回预测、预警、受影响对象和调度建议事实；如需 GIS 展示，LLM 应在本函数返回后调用 ui_show_objects 展示 HydrodynamicCell、Risk、Transfer、Place、Route 等领域对象。涉及发布预警、封路、转移等执行动作时必须说明需要人工审批。"
    function_type: lookup
    involves_objects: [ForecastRun, ForecastCell, Risk, Road, Route, Transfer, Place]
    params:
      force_forecast: {type: bool, description: "是否强制重新运行预测模型", default: false}

  analyze_inundation_impacts:
    summary: "根据预测淹没范围分析受影响对象"
    description: "读取最新或指定 ForecastCell 预测淹没网格，可按指定 time_h 分析某个预测时刻，也可默认使用最大水深包络；对道路、桥梁、重要设施、转移单元、安置地点和转移路线执行确定性空间邻近分析，返回受影响对象清单、风险等级和按类型汇总。"
    usage_prompt: "收到 InundationGenerated 事件后应优先调用本函数，forecast_id 默认 latest，target_type 默认 all。该函数是本体层确定性空间分析入口：LLM 只能根据返回结果说明哪些对象受影响，不要自行猜测学校、医院、道路、桥梁、转移路线或安置点是否受淹。当前端上下文包含 current_hydrodynamic_time_h，或用户明确询问某个时间点/当前时间轴位置的影响时，必须把该值作为 time_h 传入；用户询问总体/最大影响时不要传 time_h，默认使用最大水深包络。需要在地图展示影响分析结果时，LLM 应在本函数返回后再调用 ui_show_objects：先显示 HydrodynamicCell 且 filters={\"forecast_id\":\"latest\"}、label=预测淹没结果、fit=false、refresh=true；再优先使用 affected_object_ids 中按对象类型汇总的 ID，分别传给对应对象类型并设置 highlight=true、show_only_object_ids=true，只显示并高亮这些受影响对象，不要额外加载同类型全量对象。需要缩窄范围时 target_type 可传 Road、Bridge、Facility、Route、Transfer、Place 或 all；min_depth_m 默认 0.15，max_distance_m 默认 120。"
    function_type: lookup
    involves_objects: [ForecastRun, ForecastCell, Road, Bridge, Facility, Route, Transfer, Place, Risk]
    params:
      forecast_id: {type: str, description: "预测运行ID；latest 表示最新预测", default: "latest"}
      target_type: {type: str, description: "分析目标类型: Road/Bridge/Facility/Route/Transfer/Place/all", default: "all"}
      min_depth_m: {type: float, description: "纳入影响判定的最低预测水深，单位 m", default: 0.15}
      max_distance_m: {type: float, description: "对象或采样点到预测淹没网格中心的最大匹配距离，单位 m", default: 120}
      time_h: {type: float, description: "可选预测时刻，单位小时；不传表示使用最大水深包络", default: ""}
