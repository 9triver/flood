rules:
  road_passability_by_depth:
    description: "按水深判断道路通行风险的基础阈值。阈值应结合本地标准和车辆类型校核。"
    rule_type: threshold
    applies_to: [Risk]
    result_field: risk_level
    source: "原型规则: depth>=0.5m critical, depth>=0.3m high, depth>=0.15m medium"
    conditions:
      - {field: max_depth_m, operator: gte, value: 0.5, result: critical}
      - {field: max_depth_m, operator: gte, value: 0.3, result: high}
      - {field: max_depth_m, operator: gte, value: 0.15, result: medium}

  evacuation_route_blocked:
    description: "转移路线存在较深积水或高流速时判为转移受阻。"
    rule_type: threshold
    applies_to: [Risk]
    result_field: risk_level
    source: "原型规则: transfer route depth>=0.3m 或 velocity>=1.0m/s 为 high/critical"
    conditions:
      - {field: max_depth_m, operator: gte, value: 0.5, result: critical}
      - {field: max_velocity_mps, operator: gte, value: 1.0, result: high}
      - {field: max_depth_m, operator: gte, value: 0.3, result: high}

functions:
  list_scenarios:
    summary: "列出珊瑚河洪水情景"
    description: "返回 5、10、20、50、100 年一遇等方案编号、名称、说明和数据路径。"
    function_type: lookup
    involves_objects: [Scenario]
    params: {}

  get_scenario_summary:
    summary: "查看洪水情景的水文和影响汇总"
    description: "按 scenario_id 或重现期查询情景说明、淹没面积、损失、人口、GDP 和水文成果。"
    function_type: lookup
    involves_objects: [Scenario, Impact, Hydrology]
    params:
      scenario_id: {type: str, description: "方案编码，可选", default: ""}
      return_period_year: {type: int, description: "重现期，年，可选", default: 0}

  run_flood_forecast:
    summary: "运行或读取最新洪水预测"
    description: "读取最新四边界流量过程线，先执行干态门控规则；达到触发条件时调用 CNN_V2 水动力模型生成水动力网格 max_depth 预测结果和 ForecastRun 汇总。该函数不把 severity 或综合指标映射为 5/10/20/50/100 年一遇情景。"
    usage_prompt: "当用户要求运行预测、查看实时预测、显示未来淹没，或水文异常事件中的 forecast_trigger.should_run_forecast 为 true 且需要推演时调用。返回 ForecastRun 汇总；前端通过 HydrodynamicCell + forecast_id=latest 绘制动态水深结果。"
    function_type: lookup
    involves_objects: [ForecastRun, ForecastCell, River, Reservoir, Cell]
    params:
      forecast_id: {type: str, description: "预测运行ID；latest 表示最新预测", default: "latest"}
      force: {type: bool, description: "是否强制重新运行简化模型", default: false}

  run_emergency_cycle:
    summary: "运行水文观测-预测-告警-调度闭环原型"
    description: "使用 mock 水文观测与规则，运行简化水动力预测，生成预警级别、受影响转移对象、道路/路线关注对象和调度建议。预测结果直接来自 ForecastCell，不通过重现期情景映射。"
    usage_prompt: "当用户要求自主观测、持续预测、自动告警、闭环调度、避洪转移调度或应急循环时调用。返回可绘制对象和推荐动作；涉及发布预警、封路、转移等执行动作时必须说明需要人工审批。"
    function_type: lookup
    involves_objects: [ForecastRun, ForecastCell, Risk, Road, Route, Transfer, Place, Recommendation]
    params:
      force_forecast: {type: bool, description: "是否强制重新运行预测模型", default: false}

  analyze_risks:
    summary: "分析某情景下道路、桥梁、设施、路线等对象风险"
    description: "对指定目标类型执行空间叠加或缓存查询，生成统一 Risk 结果。"
    usage_prompt: "当用户问哪些道路会中断、哪些桥梁风险高、哪些设施受淹、哪些转移路线不可用时调用。target_type 可传 Road、Bridge、Facility、Route、Transfer、Place 或 all。"
    function_type: lookup
    involves_objects: [Scenario, Cell, Road, Bridge, Facility, Route, Transfer, Place, Risk]
    params:
      scenario_id: {type: str, description: "方案编码"}
      target_type: {type: str, description: "分析目标类型: Road/Bridge/Facility/Route/Transfer/Place/all", default: "all"}
      min_risk_level: {type: str, description: "最低风险等级过滤: low/medium/high/critical", default: "medium"}

  list_mappable_objects:
    summary: "列出可用于前端 GIS 绘制的领域对象类型"
    description: "返回哪些领域对象带有地理信息、对象数量、几何类型和推荐样式。前端应按对象类型绘制，而不是依赖领域模型中的图层对象。"
    function_type: lookup
    involves_objects: [Watershed, Waterway, County, Road, Reservoir, Sluice, HydraulicStructure, Bridge, Facility, Place, Transfer, Route, Risk, HydroStation, HistoricalFloodMark, Cell, ForecastCell, HydrodynamicCell]
    params:
      object_type: {type: str, description: "可选，按领域对象类型过滤", default: ""}

  export_objects_geojson:
    summary: "按领域对象导出前端地图可加载的 GeoJSON"
    description: "从领域对象数据导出 EPSG:4326 GeoJSON。点、线、面几何来自对象自身的 geometry 字段；ForecastCell 来自预测模型输出；HydrodynamicCell 由前端使用专门的网格瓦片接口绘制，并可叠加 forecast_id、scenario_id 或 return_period_year 对应的 max depth 结果。"
    usage_prompt: "当前端需要绘制学校、医院、桥梁、路线、道路、乡镇边界、某个洪水情景或预测淹没结果等对象时调用。传 object_type 而不是图层名；绘制乡镇边界时 object_type=Town；绘制洪水情景/年一遇淹没范围时 object_type=HydrodynamicCell 并传 scenario_id 或 return_period_year；绘制最新预测时 object_type=ForecastCell 并传 forecast_id=latest；绘制水动力模型全部网格时 object_type=HydrodynamicCell。"
    function_type: lookup
    involves_objects: [Watershed, Waterway, County, Road, Reservoir, Sluice, HydraulicStructure, Bridge, Facility, Place, Transfer, Route, Risk, HydroStation, HistoricalFloodMark, Cell, ForecastCell, HydrodynamicCell]
    params:
      object_type: {type: str, description: "领域对象类型，如 Facility、Bridge、Route、Town、Cell"}
      filters: {type: dict, description: "对象过滤条件；Cell 可用 scenario_id", default: {}}
      simplify_tolerance: {type: float, description: "可选简化容差，单位为源坐标系单位；0 表示不简化", default: 0}
      force: {type: bool, description: "是否强制重新导出", default: false}

  plan_response:
    summary: "生成封控、转移、绕行和监测建议"
    description: "根据风险结果和转移安置关系生成 Recommendation。"
    usage_prompt: "当用户问当前应该先封哪座桥、撤哪片区域、救援车辆走哪条路线或如何排序处置时调用。"
    function_type: lookup
    involves_objects: [Scenario, Risk, Recommendation, Transfer, Route, Place]
    params:
      scenario_id: {type: str, description: "方案编码"}
      focus: {type: str, description: "关注方向: evacuation/traffic/facility/all", default: "all"}

  generate_brief:
    summary: "生成应急指挥简报"
    description: "面向指挥中心或专项部门输出风险排序、关键时刻、建议动作和依据数据。"
    function_type: lookup
    involves_objects: [Scenario, Impact, Risk, Recommendation, Brief]
    params:
      scenario_id: {type: str, description: "方案编码"}
      audience: {type: str, description: "受众: command_center/public/traffic/rescue", default: "command_center"}
