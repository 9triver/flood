<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>珊瑚河洪水应急预警智能体</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="object-rail" aria-label="对象控制">
        <header class="brand">
          <div>
            <div class="eyebrow">Flood Agent</div>
            <h1>珊瑚河 GIS</h1>
          </div>
          <button class="icon-button" id="fitAllBtn" title="缩放到流域" aria-label="缩放到流域">
            <i data-lucide="scan"></i>
          </button>
        </header>

        <section class="panel-section">
          <div class="section-title">领域对象</div>
          <div class="object-list" id="objectList"></div>
        </section>

        <section class="panel-section">
          <div class="section-title">设施筛选</div>
          <div class="segmented">
            <button data-facility="school">学校</button>
            <button data-facility="hospital">医院</button>
            <button data-facility="government">政府</button>
          </div>
        </section>

        <section class="panel-section selected-panel">
          <div class="section-title">选中对象</div>
          <div id="selectedObject" class="muted">未选中</div>
        </section>
      </aside>

      <main class="map-stage">
        <div class="map-toolbar">
          <div class="context-pill" id="contextPill">基础态 · 领域对象地图</div>
          <button class="tool-button" id="clearBtn" title="恢复基础对象">
            <i data-lucide="rotate-ccw"></i>
            <span>重置</span>
          </button>
        </div>
        <div id="map"></div>
      </main>

      <aside class="agent-panel" aria-label="智能体交互">
        <header class="agent-header">
          <div>
            <div class="eyebrow">Agent</div>
            <h2>应急研判</h2>
          </div>
          <div class="status-dot" title="本地原型"></div>
        </header>

        <section class="agent-trace" id="agentTrace"></section>

        <section class="chat-log" id="chatLog"></section>

        <form class="chat-form" id="chatForm">
          <input
            id="chatInput"
            autocomplete="off"
            placeholder="询问道路、桥梁、学校、转移路线或洪水影响"
          />
          <button class="send-button" type="submit" aria-label="发送">
            <i data-lucide="send-horizontal"></i>
          </button>
        </form>
      </aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
      integrity="sha256-Ffq85bZYmLMrA/XtJen4kacprUwNbYdxEKd0SqhHqJQ="
      crossorigin="anonymous"
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
